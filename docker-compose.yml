#version: "3.8"

services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "StrongPassword@123"
    ports:
      - "1433:1433"
    networks:
      - techmove-network

  glms-backend-api:
    build:
      context: .
      dockerfile: glms-backend-api/Dockerfile
    container_name: glms-backend-api
    depends_on:
      - sql-server-db
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sql-server-db;Database=TechMove;User Id=sa;Password=StrongPassword@123;TrustServerCertificate=True;"
    ports:
      - "8080:8080"
    networks:
      - techmove-network

  glms-frontend-web:
    build:
      context: .
      dockerfile: glms-frontend-web/Dockerfile
    container_name: glms-frontend-web
    depends_on:
      - glms-backend-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ApiBaseUrl: "http://glms-backend-api:8080"
    ports:
      - "8081:8080"
    networks:
      - techmove-network

networks:
  techmove-network:
    driver: bridge